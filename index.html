<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>West Point Candidate Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="js/lib/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="header">
  <h1>West Point Candidate Intelligence</h1>
  <div id="layer-controls">

    <div class="layer-btn" id="btn-nces" style="--lc:#78a7c7" onclick="handleLayerToggle('nces')">
      <span class="layer-dot" style="background:#78a7c7"></span>
      High Schools
      <span class="layer-count" id="stat-nces"></span>
    </div>

    <div class="layer-btn" id="btn-jrotc" style="--lc:#7ea98e" onclick="handleLayerToggle('jrotc')">
      <span class="layer-dot" style="background:#7ea98e"></span>
      JROTC
      <span class="layer-count" id="stat-jrotc"></span>
    </div>

    <div class="layer-btn" id="btn-bsa" style="--lc:#c2a072" onclick="handleLayerToggle('bsa')">
      <span class="layer-dot" style="background:#c2a072"></span>
      BSA Councils
      <span class="layer-count" id="stat-bsa"></span>
    </div>

    <div class="layer-btn" id="btn-csv" style="--lc:#c0828d" onclick="toggleCSVIfLoaded()">
      <span class="layer-dot" style="background:#c0828d"></span>
      WP Applicants
      <label class="csv-label" for="csvFile" onclick="event.stopPropagation()">Upload CSV</label>
      <span class="layer-count" id="stat-csv"></span>
      <input type="file" id="csvFile" accept=".csv" style="display:none">
    </div>

    <div class="layer-btn" id="btn-gap" style="--lc:#8876c9" onclick="toggleGapLayer()" title="Requires WP CSV + at least one of NCES/JROTC/BSA">
      <span class="layer-dot" style="background:#8876c9"></span>
      Gap Analysis
      <span class="layer-count" id="stat-gap"></span>
    </div>

  </div>
</div>

<div id="map-container">

  <div id="left-panel">
    <div id="left-panel-inner">
      <div id="left-panel-header">
        <h3>Top Gap Areas</h3>
        <div id="left-panel-controls">
          <label for="gap-top-n">Top</label>
          <input type="number" id="gap-top-n" value="20" min="1" style="width:48px">
          <label>per region</label>
        </div>
        <div id="gap-filter" style="margin-top:8px">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="blind">Not on Radar</button>
          <button class="filter-btn" data-filter="under">Underrepresented</button>
        </div>
        <div class="filter-row">
          <label for="gap-region">Region</label>
          <select id="gap-region" class="gap-select">
            <option value="all">All Regions</option>
          </select>
        </div>
      </div>
      <div id="left-panel-list">
        <div id="left-panel-empty">Enable Gap Analysis layer and upload WP CSV to see top underrepresented areas.</div>
      </div>
    </div>
  </div>

  <div id="map">
    <div id="left-panel-tab" onclick="toggleLeftPanel()">GAP LIST</div>
  </div>

  <div id="sidebar">
    <div id="sidebar-inner">
      <button id="sidebar-close">&times;</button>
      <div id="sidebar-content"></div>
    </div>
  </div>

</div>

<div id="loading">
  <div class="spinner"></div>
  <p id="loadingMsg">Loading...</p>
</div>

<script src="layers.config.js"></script>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/legend.js"></script>
<script src="js/helpers.js"></script>
<script src="js/geocoding.js"></script>
<script src="js/counties.js"></script>
<script src="js/layer-handlers.js"></script>
<script src="js/nces.js"></script>
<script src="js/jrotc.js"></script>
<script src="js/bsa.js"></script>
<script src="js/csv.js"></script>
<script src="js/gap.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/left-panel.js"></script>
<script src="js/main.js"></script>
<script src="js/generic-layer.js"></script>
<script src="js/help-feedback.js"></script>

</body>
</html>

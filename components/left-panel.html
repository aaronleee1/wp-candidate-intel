<div id="left-panel">
  <div id="left-panel-inner">
    <div id="left-panel-header">
      <h3>Top Gap Areas</h3>
      <div id="left-panel-controls">
        <label for="gap-top-n">Show top</label>
        <input type="number" id="gap-top-n" value="25" min="5" max="200">
        <label>areas</label>
      </div>
      <div id="gap-filter" style="margin-top:8px">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="blind">Not on Radar</button>
        <button class="filter-btn" data-filter="under">Underrepresented</button>
      </div>
    </div>
    <div id="left-panel-list">
      <div id="left-panel-empty">Enable Gap Analysis layer and upload WP CSV to see top underrepresented areas.</div>
    </div>
  </div>
</div>

<div id="header">
  <h1>📍 West Point Candidate Intelligence</h1>
  <div id="layer-controls">

    <div class="layer-btn" id="btn-nces" style="--lc:#4dabf7" onclick="handleLayerToggle('nces')">
      <span class="layer-dot" style="background:#4dabf7"></span>
      High Schools
      <span class="layer-status" id="status-nces">click to load</span>
    </div>

    <div class="layer-btn" id="btn-jrotc" style="--lc:#51cf66" onclick="handleLayerToggle('jrotc')">
      <span class="layer-dot" style="background:#51cf66"></span>
      JROTC Programs
      <span class="layer-status" id="status-jrotc">click to load</span>
    </div>

    <div class="layer-btn" id="btn-bsa" style="--lc:#ffa94d" onclick="handleLayerToggle('bsa')">
      <span class="layer-dot" style="background:#ffa94d"></span>
      BSA Councils
      <span class="layer-status" id="status-bsa">click to load</span>
    </div>

    <div class="layer-btn" id="btn-csv" style="--lc:#e94560" onclick="toggleCSVIfLoaded()">
      <span class="layer-dot" style="background:#e94560"></span>
      WP Applicants
      <label class="csv-label" for="csvFile" onclick="event.stopPropagation()">Upload CSV</label>
      <span class="layer-status" id="status-csv" style="display:none">on</span>
      <input type="file" id="csvFile" accept=".csv" style="display:none">
    </div>

    <div class="layer-btn" id="btn-gap" style="--lc:#cc66ff" onclick="toggleGapLayer()" title="Requires WP CSV + at least one of NCES/JROTC/BSA">
      <span class="layer-dot" style="background:#cc66ff"></span>
      Gap Analysis
      <span class="layer-status" id="status-gap">needs CSV</span>
    </div>

  </div>
</div>
